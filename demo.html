<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Exercise 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>Header</header>

        <aside>Aside</aside>

        <article>
            <h2>Article</h2>

            <div class="images">
                <div class="box">Image</div>
                <div class="box">Image</div>
                <div class="box">Image</div>
            </div>

        </article>

        <footer>Footer</footer>

    </div>

</body>
</html>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:white;
}

.container{
    width:700px;
    padding:15px;
    background:#dff6f9;

    display:grid;
    grid-template-columns:1fr 2fr;
    grid-template-rows:80px 300px 80px;
    gap:15px;
}

header{
    grid-column:1/3;
    background:#2ed9d3;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:30px;
}

aside{
    background:#64ff4f;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:30px;
}

article{
    background:#d9a24d;
    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    gap:30px;
}

article h2{
    font-size:35px;
    font-weight:normal;
}

.images{
    width:90%;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.box{
    height:90px;
    background:#ffe66d;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:24px;
}

footer{
    grid-column:1/3;
    background:#2ed9d3;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:30px;
}
</style>
