<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <nav class="bg-green-100 p-3 flex items-center justify-between shadow-2xl sticky top-0 z-10">
        <h1 class="text-2xl"> Greenden </h1>

        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
            class="w-8 h-8 md:hidden">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>



        <ul class="flex gap-5 text-gray-600 hidden md:flex">
            <li>
                <a class="hover:underline hover:text-black" href="./index.html">Home</a>
            </li>
            <li>
                <a class="hover:underline hover:text-black" href="./product.html">Products</a>

            </li>
            <li>
                <a class="hover:underline hover:text-black" href="./contact.html">Contact</a>
            </li>
        </ul>
    </nav>
    <br>


    <section class="px-4 md:px-8 mt-6">
        <div class="max-w-xl mx-auto">
           <div class="mb-12">
              <h2 class="text-3xl font-bold text-slate-900 mb-6 md:text-4xl">
                 Contact us
              </h2>
              <p class="text-base leading-relaxed text-slate-600">
                 Have a question, need support, or want to discuss your next project? We’re here to help.
              </p>
           </div>
     
           <form class="space-y-6">
              <div>
                 <label for="name"
                    class="mb-2 text-slate-900 font-medium text-sm inline-block">Name</label>
                 <input type="text" id="name" name="name" placeholder="John doe"
                    class="border border-black px-3 py-2.5 text-sm text-slate-900 w-full rounded-md bg-white outline-1 -outline-offset-1 outline-slate-300 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600" />
              </div>
              <div>
                 <label for="email"
                    class="mb-2 text-slate-900 font-medium text-sm inline-block">Email</label>
                 <input type="email" id="email" name="email" placeholder="john@readymadeui.com"
                    class="border border-black px-3 py-2.5 text-sm text-slate-900 w-full rounded-md bg-white outline-1 -outline-offset-1 outline-slate-300 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600" />
              </div>
              <div>
                 <label for="phone" class="mb-2 text-slate-900 font-medium text-sm inline-block">Phone
                    number</label>
                 <input type="number" id="phone" name="phone" placeholder="+11800-259-854"
                    class="border border-black px-3 py-2.5 text-sm text-slate-900 w-full rounded-md bg-white outline-1 -outline-offset-1 outline-slate-300 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600" />
              </div>
              <div>
                 <label for="company"
                    class="mb-2 text-slate-900 font-medium text-sm inline-block">Company</label>
                 <input type="text" id="company" name="company" placeholder="XYZ pvt. ltd."
                    class="border border-black px-3 py-2.5 text-sm text-slate-900 w-full rounded-md bg-white outline-1 -outline-offset-1 outline-slate-300 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600" />
              </div>
              <div>
                 <label for="message"
                    class="mb-2 text-slate-900 font-medium text-sm inline-block">Message</label>
                 <textarea placeholder="Write message" rows="6" type="text" id="message" name="message"
                    class="border border-black px-3 py-2.5 text-sm text-slate-900 w-full rounded-md bg-white outline-1 -outline-offset-1 outline-slate-300 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600"></textarea>
              </div>
     
              <button type="submit"
                 class=" py-2.5 px-4 text-sm rounded-md font-semibold cursor-pointer text-white border border-blue-600 bg-blue-600 hover:bg-blue-700 transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">Send
                 message</button>
           </form>
        </div>
        <br>
     </section>

    <section class="bg-green-100 p-10 flex flex-col gap-10">
        <h1 class="text-4xl font-bold">Greenden</h1>
        <p>The standard chunk of Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        <p>@ 2021 Greenday.com</p>
    </section>
</body>

</html>
